<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AlphaHub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>AlphaHub</h1>
  <p>Online Services, Ticket Booking & RTO Solutions</p>
</header>

<section class="hero">
  <h2>Smart Digital Services at Your Fingertips</h2>
  <button onclick="scrollToForm()">Request Service</button>
</section>

<section class="services">
  <h2>Our Services</h2>
  <ul>
    <li>Online Form Applications</li>
    <li>RTO Services</li>
    <li>Air Ticket Booking</li>
    <li>Railway Ticket Booking</li>
  </ul>
</section>

<section id="form-section">
  <h2>Request a Service</h2>

  <form id="leadForm">
    <input type="text" id="name" placeholder="Full Name" required>
    <input type="tel" id="phone" placeholder="Phone Number" pattern="[0-9]{10}" required>

    <select>
      <option>Select Service..</option>
      <option>Form Filling</option>
      <option>RTO Services</option>
      <option>Air Ticket</option>
      <option>Railway Ticket</option>
    </select>

    <textarea placeholder="Enter details"></textarea>

    <button type="submit">Submit</button>
  </form>
</section>

<footer>
  <p>Contact: 7006905685</p>
</footer>

<script src="script.js"></script>
</body>
</html>
